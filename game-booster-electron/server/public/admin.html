<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoosterPRO | Admin Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(20, 20, 20, 0.7);
            --accent: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.3);
            --purple: #bf00ff;
            --purple-glow: rgba(191, 0, 255, 0.3);
            --text: #ffffff;
            --text-dim: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050505 100%);
            min-height: 100vh;
        }

        h1,
        h2,
        h3 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }

        .glass {
            background: var(--panel);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--accent-glow);
        }

        /* Dashboard */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
        }

        .logo span {
            color: var(--text);
            font-weight: 300;
            opacity: 0.5;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .stat-card h3 {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .stat-card.purple::after {
            background: var(--purple);
            box-shadow: 0 0 10px var(--purple);
        }

        /* Main Sections */
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .section-title {
            margin-bottom: 20px;
            font-size: 18px;
            color: var(--accent);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            font-size: 12px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-hour {
            background: #444;
            color: #fff;
        }

        .badge-day {
            background: #0088ff;
            color: #fff;
        }

        .badge-life {
            background: var(--purple);
            color: #fff;
        }

        .btn-delete {
            background: none;
            border: 1px solid rgba(255, 50, 50, 0.5);
            color: #ff3333;
            width: auto;
            padding: 5px 10px;
            font-size: 10px;
            margin-top: 0;
        }

        .btn-delete:hover {
            background: #ff3333;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 50, 50, 0.5);
        }

        .gen-card {
            padding: 30px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            margin-bottom: 15px;
            outline: none;
            cursor: pointer;
        }

        select option {
            background: #111;
            color: #fff;
        }

        #gen-result {
            margin-top: 20px;
            padding: 15px;
            border: 1px dashed var(--accent);
            border-radius: 6px;
            text-align: center;
            color: var(--accent);
            display: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="login-overlay">
        <div class="glass login-card">
            <h1 style="color: var(--accent); margin-bottom: 20px;">ADMIN LOGIN</h1>
            <input type="password" id="admin-pass" placeholder="Enter Master Password">
            <button onclick="login()">Enter Dashboard</button>
            <p id="login-error" style="color: #ff3333; font-size: 12px; margin-top: 15px;"></p>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="logo">BOOSTER<span>PRO</span> <small
                    style="font-size: 10px; margin-left:10px; letter-spacing: 0">ADMIN</small></div>
            <div id="status" style="color: var(--accent); font-size: 12px;">SYSTEM ONLINE</div>
        </header>

        <div class="stats-grid">
            <div class="glass stat-card">
                <h3>TOTAL USERS</h3>
                <div class="value" id="val-users">0</div>
            </div>
            <div class="glass stat-card purple">
                <h3>ACTIVE KEYS</h3>
                <div class="value" id="val-keys">0</div>
            </div>
            <div class="glass stat-card">
                <h3>TOTAL ACTIVATIONS</h3>
                <div class="value" id="val-activations">0</div>
            </div>
        </div>

        <div class="content-grid">
            <div class="glass" style="padding: 20px;">
                <h2 class="section-title">LICENSE KEYS</h2>
                <div style="max-height: 500px; overflow-y: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>KEY CODE</th>
                                <th>TYPE</th>
                                <th>USES</th>
                                <th>STATUS</th>
                                <th>ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="keys-table">
                            <!-- JS Populated -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="glass gen-card">
                <h2 class="section-title">GENERATE KEY</h2>
                <label style="font-size: 12px; color: var(--text-dim);">Duration Type</label>
                <select id="gen-type">
                    <option value="1Hour">1 Hour (Trial)</option>
                    <option value="1Day">1 Day</option>
                    <option value="1Week">1 Week</option>
                    <option value="1Month">1 Month</option>
                    <option value="LifeTime">LifeTime Access</option>
                </select>

                <label style="font-size: 12px; color: var(--text-dim);">Max Activations</label>
                <input type="number" id="gen-uses" value="1" min="1">

                <button onclick="generateKey()">Create New Key</button>

                <div id="gen-result" onclick="copyResult()">
                    <span id="gen-code"></span>
                    <div style="font-size: 8px; margin-top: 5px;">(Click to copy)</div>
                </div>
            </div>
        </div>

        <div class="glass" style="padding: 20px; margin-top: 30px;">
            <h2 class="section-title">REGISTERED USERS</h2>
            <table>
                <thead>
                    <tr>
                        <th>USERNAME</th>
                        <th>EXPIRATION</th>
                        <th>STATUS</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="users-table">
                    <!-- JS Populated -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API = ''; // Local calls
        let sessionToken = null;

        async function login() {
            const pass = document.getElementById('admin-pass').value;
            try {
                const res = await fetch('/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pass })
                });
                const data = await res.json();
                if (data.success) {
                    sessionToken = data.token;
                    document.getElementById('login-overlay').style.display = 'none';
                    refreshData();
                } else {
                    document.getElementById('login-error').innerText = data.message;
                }
            } catch (e) {
                document.getElementById('login-error').innerText = "Server Unreachable";
            }
        }

        async function refreshData() {
            // Fetch Stats
            const resStats = await fetch('/admin/stats');
            const stats = await resStats.json();
            document.getElementById('val-users').innerText = stats.totalUsers;
            document.getElementById('val-keys').innerText = stats.totalKeys;
            document.getElementById('val-activations').innerText = stats.totalActivations;

            // Fetch Keys
            const resKeys = await fetch('/admin/keys');
            const keys = await resKeys.json();
            const keysTable = document.getElementById('keys-table');
            keysTable.innerHTML = '';
            keys.reverse().forEach(k => {
                const badgeClass = k.type.includes('Life') ? 'badge-life' : (k.type.includes('Hour') ? 'badge-hour' : 'badge-day');
                const row = `
                    <tr>
                        <td style="font-family: monospace; color: var(--accent)">${k.code}</td>
                        <td><span class="badge ${badgeClass}">${k.type}</span></td>
                        <td>${k.uses} / ${k.max_activations}</td>
                        <td style="color: ${k.active ? '#00ff88' : '#ff3333'}">${k.active ? 'ACTIVE' : 'USED'}</td>
                        <td><button class="btn-delete" onclick="deleteKey('${k.code}')">DELETE</button></td>
                    </tr>
                `;
                keysTable.innerHTML += row;
            });

            // Fetch Users
            const resUsers = await fetch('/admin/users');
            const users = await resUsers.json();
            const usersTable = document.getElementById('users-table');
            usersTable.innerHTML = '';
            users.forEach(u => {
                const expiry = u.expiry === 'lifetime' ? 'NEVER' : (u.expiry ? new Date(u.expiry).toLocaleString() : 'NONE');
                const isExpired = u.expiry !== 'lifetime' && u.expiry && (new Date() > new Date(u.expiry));
                const status = u.expiry ? (isExpired ? 'EXPIRED' : 'ACTIVE') : 'NO LICENSE';
                const row = `
                    <tr>
                        <td>${u.name}</td>
                        <td>${expiry}</td>
                        <td style="color: ${status === 'ACTIVE' ? '#00ff88' : '#ff3333'}">${status}</td>
                        <td>
                            <button class="btn-delete" style="border-color: #ff9900; color: #ff9900; margin-right: 5px;" onclick="resetUser('${u.name}')">RESET</button>
                            <button class="btn-delete" onclick="deleteUser('${u.name}')">DELETE</button>
                        </td>
                    </tr>
                `;
                usersTable.innerHTML += row;
            });
        }

        async function resetUser(name) {
            if (!confirm(`Reset subscription for ${name}?`)) return;
            await fetch('/admin/reset-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            refreshData();
        }

        async function deleteUser(name) {
            if (!confirm(`Delete user ${name} permanently?`)) return;
            await fetch('/admin/delete-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            refreshData();
        }

        async function generateKey() {
            const type = document.getElementById('gen-type').value;
            const maxActivations = document.getElementById('gen-uses').value;

            const res = await fetch('/admin/generate-key', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type, maxActivations })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('gen-result').style.display = 'block';
                document.getElementById('gen-code').innerText = data.key.code;
                refreshData();
            }
        }

        async function deleteKey(code) {
            if (!confirm(`Delete key ${code}?`)) return;
            await fetch('/admin/delete-key', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });
            refreshData();
        }

        function copyResult() {
            const code = document.getElementById('gen-code').innerText;
            navigator.clipboard.writeText(code);
            alert("Copied to clipboard!");
        }

        // Auto Refresh every 30s
        setInterval(() => {
            if (sessionToken) refreshData();
        }, 30000);
    </script>
</body>

</html>
